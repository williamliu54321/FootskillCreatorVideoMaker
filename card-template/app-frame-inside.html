<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FootSkill AI — App Frame (Inside)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, #000 0%, #0a1525 60%, #000 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    overflow: hidden;
  }

  @keyframes fsRecPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.6; transform: scale(0.85); }
  }
  @keyframes fsBorderGlow {
    0%, 100% { box-shadow: 0 0 40px rgba(0,136,255,0.25), inset 0 0 40px rgba(0,136,255,0.08); border-color: rgba(0,136,255,0.5); }
    50%      { box-shadow: 0 0 80px rgba(0,136,255,0.5),  inset 0 0 60px rgba(0,136,255,0.15); border-color: rgba(0,212,255,0.9); }
  }
  @keyframes fsScanSweep {
    0%   { top: 0; opacity: 0; }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  @keyframes fsDotSpin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  /* STATUS BAR */
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 100px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 60px; font-size: 40px; font-weight: 600; letter-spacing: 0.5px;
    z-index: 10;
  }
  .status-icons { display: flex; align-items: center; gap: 14px; }
  .battery { width: 66px; height: 28px; border: 2px solid #fff; border-radius: 6px; position: relative; padding: 2px; }
  .battery-fill { background: #fff; width: 85%; height: 100%; border-radius: 3px; }
  .battery-tip { position: absolute; right: -6px; top: 8px; width: 4px; height: 8px; background: #fff; border-radius: 2px; }

  /* HEADER */
  .header {
    position: absolute; top: 130px; left: 0; right: 0; height: 90px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 50px; z-index: 10;
  }
  .rec-pill {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 28px;
    background: rgba(255,50,50,0.2);
    border: 2px solid rgba(255,80,80,0.8);
    border-radius: 40px;
    box-shadow: 0 0 24px rgba(255,50,50,0.4);
  }
  .rec-dot { width: 18px; height: 18px; border-radius: 50%; background: #ff3030; animation: fsRecPulse 1s ease-in-out infinite; box-shadow: 0 0 12px #ff3030; }
  .rec-time { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 700; letter-spacing: 2px; color: #fff; }
  .brand-pill {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 26px;
    background: rgba(0,20,40,0.7);
    border: 1.5px solid rgba(0,136,255,0.4);
    border-radius: 40px;
    backdrop-filter: blur(10px);
  }
  .brand-diamond { width: 18px; height: 18px; background: linear-gradient(135deg, #00d4ff, #0066cc); transform: rotate(45deg); box-shadow: 0 0 10px #00d4ff; }
  .brand-text {
    font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700; letter-spacing: 3px;
    background: linear-gradient(180deg, #fff, #00d4ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .help-btn {
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(0,20,40,0.7);
    border: 1.5px solid rgba(0,136,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: rgba(255,255,255,0.7);
  }

  /* VIDEO INSIDE ROUNDED FRAME — THIS IS THE DIFFERENCE */
  .video-frame {
    position: absolute;
    top: 260px; left: 40px; right: 40px; bottom: 260px;
    border-radius: 30px;
    border: 3px solid rgba(0,136,255,0.5);
    overflow: hidden;
    animation: fsBorderGlow 2s ease-in-out infinite;
    background: #000;
  }
  .video-frame video {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .scan-line {
    position: absolute; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, #00d4ff, transparent);
    box-shadow: 0 0 16px #00d4ff;
    animation: fsScanSweep 2.5s ease-in-out infinite;
    z-index: 5;
  }
  .corner { position: absolute; width: 40px; height: 40px; box-shadow: 0 0 8px rgba(0,212,255,0.5); }
  .corner.tl { top: 20px; left: 20px;  border-top: 3px solid #00d4ff; border-left: 3px solid #00d4ff; }
  .corner.tr { top: 20px; right: 20px; border-top: 3px solid #00d4ff; border-right: 3px solid #00d4ff; }
  .corner.bl { bottom: 20px; left: 20px;  border-bottom: 3px solid #00d4ff; border-left: 3px solid #00d4ff; }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 3px solid #00d4ff; border-right: 3px solid #00d4ff; }

  /* ANALYZING BAR */
  .analyze-bar {
    position: absolute; left: 60px; right: 60px; bottom: 90px;
    padding: 28px 40px;
    background: rgba(0,20,40,0.75);
    border: 2px solid rgba(0,136,255,0.6);
    border-radius: 60px;
    display: flex; align-items: center; justify-content: center; gap: 20px;
    box-shadow: 0 0 30px rgba(0,136,255,0.3), inset 0 0 20px rgba(0,136,255,0.1);
    backdrop-filter: blur(10px);
  }
  .spin-dot {
    width: 30px; height: 30px;
    border: 3px solid rgba(0,212,255,0.2);
    border-top-color: #00d4ff;
    border-radius: 50%;
    animation: fsDotSpin 1s linear infinite;
    box-shadow: 0 0 10px rgba(0,212,255,0.5);
  }
  .analyze-text {
    font-family: 'Orbitron', monospace;
    font-size: 34px; font-weight: 700; letter-spacing: 4px;
    background: linear-gradient(180deg, #fff, #00d4ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .home-indicator {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 280px; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="48" height="28" viewBox="0 0 48 28">
        <rect x="0"  y="18" width="8" height="10" rx="1" fill="#fff"/>
        <rect x="12" y="13" width="8" height="15" rx="1" fill="#fff"/>
        <rect x="24" y="7"  width="8" height="21" rx="1" fill="#fff"/>
        <rect x="36" y="0"  width="8" height="28" rx="1" fill="#fff"/>
      </svg>
      <svg width="44" height="30" viewBox="0 0 44 30" fill="none">
        <path d="M12 18 Q22 10 32 18" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M4 10 Q22 -6 40 10" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="22" cy="25" r="3" fill="#fff"/>
      </svg>
      <div class="battery"><div class="battery-fill"></div><div class="battery-tip"></div></div>
    </div>
  </div>

  <div class="header">
    <div class="rec-pill">
      <div class="rec-dot"></div>
      <span class="rec-time" id="rec-time">00:00</span>
    </div>
    <div class="brand-pill">
      <div class="brand-diamond"></div>
      <span class="brand-text">FOOTSKILL AI</span>
    </div>
    <div class="help-btn">?</div>
  </div>

  <div class="video-frame">
    <video id="content" autoplay muted playsinline></video>
    <div class="scan-line"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div class="analyze-bar">
    <div class="spin-dot"></div>
    <span class="analyze-text">ANALYZING</span>
  </div>

  <div class="home-indicator"></div>

  <script>
    const video = document.getElementById('content');
    const label = document.getElementById('rec-time');
    function fmt(t) {
      const mm = String(Math.floor(t / 60)).padStart(2, '0');
      const ss = String(Math.floor(t % 60)).padStart(2, '0');
      return mm + ':' + ss;
    }
    video.addEventListener('timeupdate', () => {
      label.textContent = fmt(video.currentTime);
    });
  </script>
</body>
</html>
